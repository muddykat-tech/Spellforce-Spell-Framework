name: Build and Draft Release Framework

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-2025

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up MinGW
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x86
        version: 12.2.0

    - name: Compile Project
      run: |
        mingw32-make clean
        mingw32-make

    - name: Zip API files
      run: |
        powershell -Command "Compress-Archive -Path src/api/* -DestinationPath api.zip"

    - name: Upload ASI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sfsf-asi
        path: bin/sfsf.asi

    - name: Upload API Zip Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sfsf-api-headers
        path: api.zip # Fixed from api-files.zip to match the zip target name

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        # Dynamically falls back to a temporary tag format if no actual Git tag exists
        tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('draft-{0}-run-{1}', github.ref_name, github.run_number) }}
        name: "Draft Release (${{ github.ref_name }})"
        files: |
          bin/sfsf.asi
          api.zip
        draft: true
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
